name: Mown Webpage Snapshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to snapshot'
        required: true
        default: 'https://example.com'

jobs:
  snapshot:
    name: Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve output directory
        id: resolve
        run: |
          DOMAIN=$(echo "${{ inputs.url }}" | sed -E 's|https?://||' | sed -E 's|/.*||')
          DATE=$(date +%Y-%m-%d)
          DIR_NAME="${DATE}_${DOMAIN}"
          FULL_PATH="downloads/snapshot/${DIR_NAME}"

          echo "domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT
          echo "full_path=$FULL_PATH" >> $GITHUB_OUTPUT

          if [ -d "$FULL_PATH" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Snapshot already exists for $DOMAIN on $DATE — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ No snapshot found for $DOMAIN on $DATE — proceeding."
          fi

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-httrack-${{ hashFiles('lib/snapshot.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-httrack-

      - name: Install HTTrack
        if: steps.resolve.outputs.skip == 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q httrack

      - name: Mirror website
        if: steps.resolve.outputs.skip == 'false'
        env:
          URL: ${{ inputs.url }}
          FULL_PATH: ${{ steps.resolve.outputs.full_path }}
        run: |
          mkdir -p "$FULL_PATH"

          httrack "$URL" \
            -r3 \
            -%v \
            -O "$FULL_PATH" \
            --robots=0 \
            -K \
            -C \
            --disable-security-limits \
            || true

          FILE_COUNT=$(find "$FULL_PATH" -type f | wc -l)
          echo "📦 Mirrored $FILE_COUNT files to $FULL_PATH"

      - name: Get file size
        if: steps.resolve.outputs.skip == 'false'
        id: size
        run: |
          SIZE=$(du -sb "${{ steps.resolve.outputs.full_path }}" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Update history.json
        if: steps.resolve.outputs.skip == 'false'
        run: |
          # Create history.json if not exists
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi

          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          DIR_NAME="${{ steps.resolve.outputs.dir_name }}"
          FULL_PATH="${{ steps.resolve.outputs.full_path }}"
          FILE_SIZE="${{ steps.size.outputs.size }}"

          # Count files in snapshot
          FILE_COUNT=$(find "$FULL_PATH" -type f 2>/dev/null | wc -l || echo 0)

          # Check if entry already exists
          EXISTS=$(jq --arg id "$DIR_NAME" '[.[] | select(.id == $id and .type == "snapshot")] | length' history.json)

          if [ "$EXISTS" -eq 0 ]; then
            # Build list of key files (index.html and first few files)
            KEY_FILES="[]"
            if [ -f "${FULL_PATH}/index.html" ]; then
              KEY_FILES='["index.html"]'
            fi

            # Add entry
            jq --arg id "$DIR_NAME" \
               --arg filename "$DIR_NAME" \
               --arg title "${{ steps.resolve.outputs.domain }}" \
               --arg url "${{ inputs.url }}" \
               --arg githubUrl "https://github.com/${{ github.repository }}/blob/main/downloads/snapshot/$DIR_NAME" \
               --arg downloadUrl "https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/snapshot/$DIR_NAME" \
               --arg thumbnail "" \
               --arg type "snapshot" \
               --arg quality "" \
               --arg format "html" \
               --arg duration "" \
               --arg size "$FILE_SIZE" \
               --arg createdAt "$TIMESTAMP" \
               --argjson fileCount "$FILE_COUNT" \
               --argjson isSplit false \
               '. += [{
                 id: $id,
                 filename: $filename,
                 title: $title,
                 url: $url,
                 githubUrl: $githubUrl,
                 downloadUrl: $downloadUrl,
                 thumbnail: $thumbnail,
                 type: $type,
                 quality: $quality,
                 format: $format,
                 duration: $duration,
                 size: $size,
                 createdAt: $createdAt,
                 fileCount: $fileCount,
                 isSplit: $isSplit,
                 parts: []
               }]' history.json > history.json.tmp && mv history.json.tmp history.json

            echo "Added to history.json: $DIR_NAME"
          fi

          # Keep only last 100 entries
          jq '.[-100:]' history.json > history.json.tmp && mv history.json.tmp history.json

      - name: Commit and push
        if: steps.resolve.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/snapshot/ history.json
          git commit -m "mown: Mirror ${{ steps.resolve.outputs.domain }} (${{ steps.resolve.outputs.dir_name }})" || echo "Nothing to commit"
          git push || echo "Push failed"

      - name: Upload artifact
        if: steps.resolve.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.resolve.outputs.dir_name }}
          path: ${{ steps.resolve.outputs.full_path }}
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup old snapshots
        if: steps.resolve.outputs.skip == 'false'
        run: |
          cd downloads/snapshot 2>/dev/null || exit 0

          SNAPSHOT_COUNT=$(find . -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "📁 Total snapshots: $SNAPSHOT_COUNT"

          if [ "$SNAPSHOT_COUNT" -gt 20 ]; then
            echo "🧹 Cleaning up — keeping 20 most recent..."

            find . -maxdepth 1 -mindepth 1 -type d -printf '%T@ %p\n' | \
              sort -rn | tail -n +21 | cut -d' ' -f2- | while read dir; do
              echo "  Removing: $dir"
              rm -rf "$dir"
            done

            cd ../..
            git add -A
            git commit -m "mown: Auto cleanup old snapshots" || true
            git push || true
          fi
