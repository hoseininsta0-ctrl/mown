name: Mown Download Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL to download'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 2160p
          - 1440p
          - 1080p
          - 720p
          - 480p
          - audio
      format:
        description: 'Output format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - webm
          - mp3

permissions:
  contents: read
  actions: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: UTC
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp[default,EJS]
          sudo apt-get update
          sudo apt-get install -y ca-certificates ffmpeg

      - name: Create downloads directory
        run: mkdir -p downloads/youtube

      - name: Write cookies from secret
        env:
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$COOKIES" ]; then
            printf '%s' "$COOKIES" > cookies.txt
            echo "Cookies file created: $(wc -l < cookies.txt) lines"
          else
            echo "WARNING: YT_COOKIES secret not found, proceeding without cookies"
            echo "YouTube downloads may fail for restricted videos"
          fi

      - name: Download video
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
          FORMAT: ${{ github.event.inputs.format }}
        run: |
          echo "Starting download..."
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          echo "Format: $FORMAT"

          # Build quality options - more flexible for Shorts
          case "$QUALITY" in
            "best")
              QUALITY_OPT="bestvideo+bestaudio/best"
              ;;
            "2160p")
              QUALITY_OPT="bestvideo[height<=2160]+bestaudio/best[height<=2160]"
              ;;
            "1440p")
              QUALITY_OPT="bestvideo[height<=1440]+bestaudio/best[height<=1440]"
              ;;
            "1080p")
              QUALITY_OPT="bestvideo[height<=1080]+bestaudio/best[height<=1080]"
              ;;
            "720p")
              QUALITY_OPT="bestvideo[height<=720]+bestaudio/best[height<=720]"
              ;;
            "480p")
              QUALITY_OPT="bestvideo[height<=480]+bestaudio/best[height<=480]/worst"
              ;;
            "audio")
              QUALITY_OPT="bestaudio/best"
              ;;
            *)
              QUALITY_OPT="best"
              ;;
          esac

          # Cookies are optional now
          COOKIE_ARG=""
          if [ -f "cookies.txt" ]; then
            COOKIE_ARG="--cookies cookies.txt"
            echo "Using cookies for authentication"
          else
            echo "No cookies file found, proceeding without authentication"
          fi

          if [ "$FORMAT" = "mp3" ] || [ "$QUALITY" = "audio" ]; then
            # Audio-only download
            OUTPUT_TEMPLATE="downloads/youtube/%(title)s.%(ext)s"
            yt-dlp \
              --format "$QUALITY_OPT" \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality 0 \
              --output "$OUTPUT_TEMPLATE" \
              --write-info-json \
              --write-thumbnail \
              --convert-thumbnails jpg \
              $COOKIE_ARG \
              --js-runtimes node \
              "$URL"
          else
            # Video download - add fallback for Shorts
            OUTPUT_TEMPLATE="downloads/youtube/%(title)s.%(ext)s"
            yt-dlp \
              --format "$QUALITY_OPT" \
              --merge-output-format "$FORMAT" \
              --output "$OUTPUT_TEMPLATE" \
              --write-info-json \
              --write-thumbnail \
              --convert-thumbnails jpg \
              $COOKIE_ARG \
              --js-runtimes node \
              --retries 3 \
              --fragment-retries 3 \
              "$URL" || \
            # Fallback: try with worst quality if best fails (Shorts compatibility)
            yt-dlp \
              --format "worstvideo+worstaudio/worst" \
              --merge-output-format "$FORMAT" \
              --output "$OUTPUT_TEMPLATE" \
              --write-info-json \
              --write-thumbnail \
              --convert-thumbnails jpg \
              $COOKIE_ARG \
              --js-runtimes node \
              "$URL"
          fi

          echo "Download complete"

          # Get the downloaded file name
          DOWNLOADED_FILE=$(ls -t downloads/youtube/*.mp4 downloads/youtube/*.webm downloads/youtube/*.mkv downloads/youtube/*.mp3 2>/dev/null | head -1 || echo "")
          if [ -n "$DOWNLOADED_FILE" ]; then
            echo "file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
            echo "Downloaded: $DOWNLOADED_FILE"
          fi

      - name: Extract metadata
        id: metadata
        run: |
          for info_file in downloads/youtube/*.info.json; do
            [ -f "$info_file" ] || continue
            base_name=$(basename "${info_file%.info.json}")

            # Find local thumbnail (jpg preferred, else use URL from info.json)
            thumb_path=""
            for ext in jpg webp png; do
              candidate="downloads/youtube/${base_name}.${ext}"
              if [ -f "$candidate" ]; then
                thumb_path="$candidate"
                break
              fi
            done
            if [ -z "$thumb_path" ]; then
              thumb_path=$(ls -t downloads/youtube/*.jpg 2>/dev/null | head -1 || echo "")
            fi

            # Use local thumbnail if found, otherwise fall back to URL from info.json
            jq --arg local_thumb "$thumb_path" '{
              title: (.title // "Unknown"),
              uploader: (.uploader // "Unknown"),
              duration: (.duration_string // "Unknown"),
              upload_date: (.upload_date // "Unknown"),
              view_count: (.view_count // 0),
              description: ((.description // "") | .[0:200]),
              original_url: (.webpage_url // ""),
              thumbnail: (if $local_thumb != "" then $local_thumb else (.thumbnail // "") end)
            }' "$info_file" > "downloads/youtube/${base_name}.json"

            echo "Created metadata: downloads/youtube/${base_name}.json"
          done

      - name: Cleanup temp files
        run: |
          # Remove info.json and thumbnail files (keep jpg thumbnails)
          rm -f downloads/youtube/*.info.json
          rm -f downloads/youtube/*.webp downloads/youtube/*.png

      - name: Split large files
        run: |
          # Split files >100MB into zip chunks
          MAX_SIZE=$((100 * 1024 * 1024))  # 100MB
          CHUNK_SIZE=$((90 * 1024 * 1024))  # 90MB

          cd downloads/youtube
          for file in *; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt "$MAX_SIZE" ]; then
                echo "Splitting and zipping large file: $file ($(numfmt --to=iec-i --suffix=B $size 2>/dev/null || echo $size bytes))"

                # Split file into chunks first
                base="${file%.*}"
                ext="${file##*.}"
                split -b "$CHUNK_SIZE" -d -a 2 "$file" "${base}part"

                # Zip each chunk individually
                part_num=1
                for part in "${base}part"*; do
                  if [ -f "$part" ]; then
                    zip -q "${base}part$(printf '%02d' $part_num).zip" "$part"
                    rm -f "$part"
                    part_num=$((part_num + 1))
                  fi
                done

                # Count parts
                part_count=$(ls -1 "${base}part"*.zip 2>/dev/null | wc -l)

                # Remove original file
                rm -f "$file"

                # Update metadata
                if [ -f "${base}.json" ]; then
                  python3 -c "import json,sys; f=open(sys.argv[1],'r'); d=json.load(f); f.close(); d['split']=True; d['zip']=True; d['parts']=int(sys.argv[2]); d['original_size']=int(sys.argv[3]); d['ext']=sys.argv[4]; f=open(sys.argv[1],'w'); json.dump(d,f,indent=2); f.close()" "${base}.json" "$part_count" "$size" "$ext"
                fi

                echo "Split and zipped into $part_count parts"
              fi
            fi
          done
          cd ../..

      - name: Commit and push
        run: |
          set -e
          git config user.name "mown Downloader"
          git config user.email "mown@system.local"

          git add downloads/youtube/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "mown: Download $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin main
            git push
            echo "Committed and pushed"
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: download
          path: downloads/youtube/
          retention-days: 1

      - name: Cleanup old downloads
        if: always()
        run: |
          set -e
          # Keep only last 50 files to prevent repo bloat
          cd downloads/youtube 2>/dev/null || exit 0

          # Count video files safely
          VIDEO_COUNT=$(find . -maxdepth 1 \( -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" -o -name "*.mp3" \) -type f 2>/dev/null | wc -l)

          if [ "$VIDEO_COUNT" -gt 50 ]; then
            echo "Too many files ($VIDEO_COUNT), cleaning up old ones..."
            # List files by modification time, skip the 50 newest
            find . -maxdepth 1 \( -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" -o -name "*.mp3" \) -type f -printf '%T@ %p\n' 2>/dev/null | \
              sort -rn | tail -n +51 | cut -d' ' -f2- | while read file; do
              echo "Removing old file: $file"
              rm -f "$file"
              # Also remove associated metadata
              base="${file%.*}"
              rm -f "${base}.json"
              rm -f "${base}.jpg"
            done

            # Commit cleanup
            cd ../..
            git add -A
            git commit -m "mown: Auto cleanup old files" || true
            git push || true
          fi
