name: Mown Direct Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct file URL'
        required: true
        type: string
      filename:
        description: 'Output filename'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create downloads directory
        run: mkdir -p downloads/files

      - name: Download file
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          curl -L --retry 3 -o "downloads/files/$FILENAME" "$URL"
          echo "Downloaded: downloads/files/$FILENAME"

      - name: Split large files
        run: |
          MAX_SIZE=$((95 * 1024 * 1024))
          CHUNK_SIZE=$((90 * 1024 * 1024))

          cd downloads/files
          for file in *; do
            [ -f "$file" ] || continue
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo 0)
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "Splitting large file: $file ($size bytes)"
              base="${file%.*}"
              ext="${file##*.}"

              split -b "$CHUNK_SIZE" -d -a 2 "$file" "${base}part"

              part_num=1
              for part in "${base}part"*; do
                [ -f "$part" ] || continue
                zip -q "${base}part$(printf '%02d' $part_num).zip" "$part"
                rm -f "$part"
                part_num=$((part_num + 1))
              done

              rm -f "$file"
              echo "Split into $((part_num - 1)) parts"
            fi
          done
          cd ../..

      - name: Update history.json and settings.json
        run: |
          # Create history.json if not exists
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi

          # Create settings.json if not exists
          if [ ! -f settings.json ]; then
            echo '{"repoName":"${{ github.event.repository.name }}","owner":"${{ github.repository_owner }}","createdAt":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","lastSync":"","workflows":{"youtube":false,"direct":true,"snapshot":false,"soundcloud":false},"totalDownloads":0}' > settings.json
          fi

          # Get downloaded file info
          DOWNLOADED_FILE=$(ls -t downloads/files/* 2>/dev/null | head -1 || echo "")
          if [ -n "$DOWNLOADED_FILE" ] && [ -f "$DOWNLOADED_FILE" ]; then
            FILENAME=$(basename "$DOWNLOADED_FILE")
            FILE_SIZE=$(stat -c%s "$DOWNLOADED_FILE" 2>/dev/null || stat -f%z "$DOWNLOADED_FILE" 2>/dev/null || echo 0)

            # Add entry to history.json
            jq --arg id "$(date +%s)-$(random 2>/dev/null || echo $RANDOM)" \
               --arg filename "$FILENAME" \
               --arg title "$FILENAME" \
               --arg url "https://github.com/${{ github.repository }}/blob/main/downloads/files/$FILENAME" \
               --arg downloadUrl "https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/files/$FILENAME" \
               --arg thumbnail "" \
               --arg type "direct" \
               --arg quality "" \
               --arg format "${FILENAME##*.}" \
               --arg duration "" \
               --arg size "$FILE_SIZE" \
               --arg createdAt "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
               '. += [{
                 id: $id,
                 filename: $filename,
                 title: $title,
                 url: $url,
                 downloadUrl: $downloadUrl,
                 thumbnail: $thumbnail,
                 type: $type,
                 quality: $quality,
                 format: $format,
                 duration: $duration,
                 size: $size,
                 createdAt: $createdAt
               }]' history.json > history.json.tmp && mv history.json.tmp history.json

            # Update settings.json
            jq '.totalDownloads += 1 | .lastSync = "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'" | .workflows.direct = true' settings.json > settings.json.tmp && mv settings.json.tmp settings.json

            echo "Updated history.json and settings.json with: $FILENAME"
          fi

      - name: Commit and push
        run: |
          set -e
          git config user.name "mown Downloader"
          git config user.email "mown@system.local"

          git add downloads/files/ history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "mown: Download $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin main
            git push
            echo "Committed and pushed"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: download
          path: downloads/files/
          retention-days: 1
