appId: com.mrmeshky.mown
productName: Mown
copyright: "Copyright © 2024 MrMeshky"

asar: true
asarUnpack:
  - "**/*.node"

# No native modules need rebuilding — all deps are pure JS/WASM
npmRebuild: false
nodeGypRebuild: false

directories:
  output: dist-electron
  buildResources: build

# Main process files
files:
  - electron/dist/**/*
  - "!electron/src"
  - "!electron/tsconfig.json"

# Bundle the Next.js standalone server into resources/app/
extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
      - "!**/*.map"
      - "!**/*.md"
      - "!**/CHANGELOG*"
      - "!**/LICENSE*"
      - "!**/*.ts"
      - "!**/node_modules/.cache/**"
      - "!**/node_modules/next/dist/compiled/jest-worker/**"
      - "!**/node_modules/next/dist/compiled/webpack/**"
      - "!**/node_modules/next/dist/compiled/css-loader/**"
      - "!**/node_modules/next/dist/compiled/postcss/**"
      - "!**/node_modules/next/dist/compiled/babel/**"
      - "!**/node_modules/next/dist/compiled/eslint/**"
      - "!**/node_modules/next/dist/compiled/styled-jsx/**"
      - "!**/node_modules/next/dist/build/**"
      - "!**/node_modules/next/dist/cli/**"

# macOS
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  target:
    - target: dmg
    - target: zip
  icon: build/icon.icns

dmg:
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  publisherName: MrMeshky

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mown
  compression: maximum

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icons
  category: Network
  synopsis: Download manager powered by GitHub Actions
  description: Mown - A download manager that uses GitHub Actions as its backend

deb:
  afterInstall: build/linux/after-install.sh
  afterRemove: build/linux/after-remove.sh
  compression: xz

# Auto-update (optional, uses GitHub Releases)
publish:
  provider: github
  owner: Mr-Meshky
  repo: mown
