name: Mown Download SoundCloud

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'SoundCloud URL to download'
        required: true
        type: string
      quality:
        description: 'Audio quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 320k
          - 256k
          - 192k
          - 128k
      format:
        description: 'Output format'
        required: true
        default: 'mp3'
        type: choice
        options:
          - mp3
          - wav
          - flac
          - ogg

permissions:
  contents: read
  actions: write

jobs:
  download:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ytdlp-v2
          restore-keys: ${{ runner.os }}-pip-ytdlp-

      - name: Install yt-dlp
        run: pip install -q --upgrade yt-dlp yt-dlp-ejs

      - name: Download audio
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
          FORMAT: ${{ github.event.inputs.format }}
        run: |
          mkdir -p downloads/soundcloud

          URL_HASH=$(echo -n "$URL" | md5sum | cut -d' ' -f1)
          CACHE_FILE="downloads/soundcloud/.cache_${URL_HASH}"

          if [ -f "$CACHE_FILE" ]; then
            CACHED=$(cat "$CACHE_FILE")
            if [ -f "downloads/soundcloud/$CACHED" ]; then
              echo "Cache hit: $CACHED"
              echo "file=downloads/soundcloud/$CACHED" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          case "$QUALITY" in
            best)  QUALITY_OPT="bestaudio/best" ;;
            320k)  QUALITY_OPT="bestaudio[abr<=320]/bestaudio/best" ;;
            256k)  QUALITY_OPT="bestaudio[abr<=256]/bestaudio/best" ;;
            192k)  QUALITY_OPT="bestaudio[abr<=192]/bestaudio/best" ;;
            128k)  QUALITY_OPT="bestaudio[abr<=128]/bestaudio/best" ;;
            *)     QUALITY_OPT="bestaudio/best" ;;
          esac

          yt-dlp \
            --format "$QUALITY_OPT" \
            --extract-audio --audio-format "$FORMAT" --audio-quality 0 \
            --output "downloads/soundcloud/%(title)s.%(ext)s" \
            --write-info-json --write-thumbnail --convert-thumbnails jpg \
            --concurrent-fragments 4 \
            --retries 3 --fragment-retries 3 \
            --js-runtimes node \
            "$URL"

          DOWNLOADED=$(ls -t downloads/soundcloud/*.mp3 downloads/soundcloud/*.wav \
            downloads/soundcloud/*.flac downloads/soundcloud/*.ogg 2>/dev/null | head -1 || echo "")

          if [ -n "$DOWNLOADED" ]; then
            echo "file=$DOWNLOADED" >> $GITHUB_OUTPUT
            echo "Downloaded: $DOWNLOADED"
            echo "$(basename "$DOWNLOADED")" > "$CACHE_FILE"
          fi

      - name: Extract metadata
        run: |
          for info_file in downloads/soundcloud/*.info.json; do
            [ -f "$info_file" ] || continue
            base=$(basename "${info_file%.info.json}")

            thumb=""
            for ext in jpg webp png; do
              [ -f "downloads/soundcloud/${base}.${ext}" ] && thumb="downloads/soundcloud/${base}.${ext}" && break
            done
            [ -z "$thumb" ] && thumb=$(ls -t downloads/soundcloud/*.jpg 2>/dev/null | head -1 || echo "")

            jq --arg t "$thumb" '{
              title:       (.title          // "Unknown"),
              uploader:    (.artist // .uploader // "Unknown"),
              duration:    (.duration_string // "Unknown"),
              upload_date: (.upload_date    // "Unknown"),
              view_count:  (.view_count     // 0),
              description: ((.description  // "") | .[0:200]),
              original_url:(.webpage_url   // ""),
              thumbnail:   (if $t != "" then $t else (.thumbnail // "") end),
              track:       (.track // ""),
              album:       (.album // "")
            }' "$info_file" > "downloads/soundcloud/${base}.json"
          done
          rm -f downloads/soundcloud/*.info.json downloads/soundcloud/*.webp downloads/soundcloud/*.png

      - name: Split large files
        run: |
          MAX=$((100 * 1024 * 1024))
          CHUNK=$((90  * 1024 * 1024))
          cd downloads/soundcloud
          for f in *; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            [ "$size" -le "$MAX" ] && continue

            base="${f%.*}"; ext="${f##*.}"
            split -b "$CHUNK" -d -a 2 "$f" "${base}part"
            n=1
            for part in "${base}part"*; do
              [ -f "$part" ] || continue
              zip -q "${base}part$(printf '%02d' $n).zip" "$part" && rm -f "$part"
              n=$((n+1))
            done
            parts=$(ls -1 "${base}part"*.zip 2>/dev/null | wc -l)
            rm -f "$f"
            [ -f "${base}.json" ] && python3 -c "
import json,sys
d=json.load(open(sys.argv[1]))
d.update({'split':True,'zip':True,'parts':int(sys.argv[2]),'original_size':int(sys.argv[3]),'ext':sys.argv[4]})
json.dump(d,open(sys.argv[1],'w'),indent=2)" "${base}.json" "$parts" "$size" "$ext"
          done
          cd ../..

      - name: Update history.json
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          [ -f "$REPO_ROOT/history.json" ] || echo "[]" > "$REPO_ROOT/history.json"

          cd downloads/soundcloud
          for mf in *.mp3 *.wav *.flac *.ogg; do
            [ -f "$mf" ] || continue
            base="${mf%.*}"; ext="${mf##*.}"
            size=$(stat -c%s "$mf" 2>/dev/null || echo 0)
            ts=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

            IS_SPLIT=false; PARTS_JSON="[]"
            if ls ${base}part*.zip 1>/dev/null 2>&1; then
              IS_SPLIT=true
              pc=$(ls -1 ${base}part*.zip 2>/dev/null | wc -l)
              arr=""
              for i in $(seq 1 $pc); do
                pf="${base}part$(printf '%02d' $i).zip"
                [ -f "$pf" ] || continue
                [ -n "$arr" ] && arr="$arr,"
                ps=$(stat -c%s "$pf" 2>/dev/null || echo 0)
                arr="${arr}{\"filename\":\"$pf\",\"size\":$ps}"
              done
              PARTS_JSON="[$arr]"
            fi

            TITLE="$base"; THUMB=""; DUR=""; UPL=""; TRK=""; ALB=""
            if [ -f "${base}.json" ]; then
              TITLE=$(jq -r '.title     // "Unknown"' "${base}.json")
              THUMB=$(jq -r '.thumbnail // ""'        "${base}.json")
              DUR=$(jq   -r '.duration  // ""'        "${base}.json")
              UPL=$(jq   -r '.uploader  // ""'        "${base}.json")
              TRK=$(jq   -r '.track     // ""'        "${base}.json")
              ALB=$(jq   -r '.album     // ""'        "${base}.json")
              [ -f "${base}.jpg" ] && THUMB="${base}.jpg"
            fi
            TITLE=$(echo "$TITLE" | jq -Rs '.[:-1] // .')

            EXISTS=$(jq --arg fn "$mf" \
              '[.[] | select(.filename==$fn and .type=="soundcloud")] | length' \
              "$REPO_ROOT/history.json")
            [ "$EXISTS" -eq 0 ] || continue

            jq --arg id  "$(date +%s)-$RANDOM" \
               --arg fn  "$mf" \
               --arg ti  "$TITLE" \
               --arg ghu "https://github.com/${{ github.repository }}/blob/main/downloads/soundcloud/$mf" \
               --arg th  "$THUMB" \
               --arg q   "${{ github.event.inputs.quality }}" \
               --arg fmt "$ext" \
               --arg dur "$DUR" \
               --arg upl "$UPL" \
               --arg trk "$TRK" \
               --arg alb "$ALB" \
               --arg sz  "$size" \
               --arg cat "$ts" \
               --arg rid "${{ github.run_id }}" \
               --argjson sp "$IS_SPLIT" \
               --argjson pa "$PARTS_JSON" \
               '. += [{id:$id,filename:$fn,title:$ti,githubUrl:$ghu,
                       thumbnail:$th,type:"soundcloud",quality:$q,format:$fmt,
                       duration:$dur,uploader:$upl,track:$trk,album:$alb,
                       size:$sz,createdAt:$cat,isSplit:$sp,parts:$pa,runId:$rid}]' \
               "$REPO_ROOT/history.json" > "$REPO_ROOT/history.json.tmp" \
            && mv "$REPO_ROOT/history.json.tmp" "$REPO_ROOT/history.json"
            echo "Added: $mf"
          done

          cd "$REPO_ROOT"
          jq '.[-100:]' history.json > history.json.tmp && mv history.json.tmp history.json

      - name: Commit and push
        run: |
          git config user.name  "mown Downloader"
          git config user.email "mown@system.local"
          git add downloads/soundcloud/ history.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "mown: SoundCloud $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: download
          path: downloads/soundcloud/
          retention-days: 1

      - name: Cleanup old downloads
        if: always()
        run: |
          cd downloads/soundcloud 2>/dev/null || exit 0
          COUNT=$(find . -maxdepth 1 \
            \( -name "*.mp3" -o -name "*.wav" -o -name "*.flac" -o -name "*.ogg" \) \
            -type f | wc -l)
          [ "$COUNT" -le 50 ] && exit 0

          find . -maxdepth 1 \
            \( -name "*.mp3" -o -name "*.wav" -o -name "*.flac" -o -name "*.ogg" \) \
            -type f -printf '%T@ %p\n' | sort -rn | tail -n +51 | cut -d' ' -f2- | \
          while read f; do
            rm -f "$f" "${f%.*}.json" "${f%.*}.jpg"
          done

          cd ../..
          git add -A && git commit -m "mown: Auto cleanup SC" || true
          git push || true