name: Mown Download Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL to download'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 2160p
          - 1440p
          - 1080p
          - 720p
          - 480p
          - audio
      format:
        description: 'Output format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - webm
          - mp3

permissions:
  contents: read
  actions: write

jobs:
  download:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ytdlp-v2
          restore-keys: ${{ runner.os }}-pip-ytdlp-

      # ubuntu-24.04 دارای python3، node20، ffmpeg از پیش است
      # نیازی به setup-python، setup-node، apt-get install نیست
      - name: Install yt-dlp
        run: pip install -q --upgrade yt-dlp yt-dlp-ejs

      - name: Write cookies from secret
        env:
          COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$COOKIES" ]; then
            printf '%s' "$COOKIES" > cookies.txt
            echo "Cookies file created: $(wc -l < cookies.txt) lines"
          else
            echo "No YT_COOKIES secret — proceeding without cookies"
          fi

      - name: Download video
        id: download
        env:
          URL: ${{ github.event.inputs.url }}
          QUALITY: ${{ github.event.inputs.quality }}
          FORMAT: ${{ github.event.inputs.format }}
        run: |
          mkdir -p downloads/youtube

          URL_HASH=$(echo -n "$URL" | md5sum | cut -d' ' -f1)
          CACHE_FILE="downloads/youtube/.cache_${URL_HASH}"

          if [ -f "$CACHE_FILE" ]; then
            CACHED=$(cat "$CACHE_FILE")
            if [ -f "downloads/youtube/$CACHED" ]; then
              echo "Cache hit: $CACHED"
              echo "file=downloads/youtube/$CACHED" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          case "$QUALITY" in
            best)   QUALITY_OPT="bestvideo+bestaudio/best" ;;
            2160p)  QUALITY_OPT="bestvideo[height<=2160]+bestaudio/best[height<=2160]" ;;
            1440p)  QUALITY_OPT="bestvideo[height<=1440]+bestaudio/best[height<=1440]" ;;
            1080p)  QUALITY_OPT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            720p)   QUALITY_OPT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            480p)   QUALITY_OPT="bestvideo[height<=480]+bestaudio/best[height<=480]/worst" ;;
            audio)  QUALITY_OPT="bestaudio/best" ;;
            *)      QUALITY_OPT="best" ;;
          esac

          COOKIE_ARG=""
          [ -f "cookies.txt" ] && COOKIE_ARG="--cookies cookies.txt"

          OUTPUT="downloads/youtube/%(title)s.%(ext)s"

          if [ "$FORMAT" = "mp3" ] || [ "$QUALITY" = "audio" ]; then
            yt-dlp \
              --format "$QUALITY_OPT" \
              --extract-audio --audio-format mp3 --audio-quality 0 \
              --output "$OUTPUT" \
              --write-info-json --write-thumbnail --convert-thumbnails jpg \
              --concurrent-fragments 4 \
              $COOKIE_ARG --js-runtimes node \
              "$URL"
          else
            yt-dlp \
              --format "$QUALITY_OPT" \
              --merge-output-format "$FORMAT" \
              --output "$OUTPUT" \
              --write-info-json --write-thumbnail --convert-thumbnails jpg \
              --concurrent-fragments 4 \
              --retries 3 --fragment-retries 3 \
              $COOKIE_ARG --js-runtimes node \
              "$URL" || \
            yt-dlp \
              --format "worstvideo+worstaudio/worst" \
              --merge-output-format "$FORMAT" \
              --output "$OUTPUT" \
              --write-info-json --write-thumbnail --convert-thumbnails jpg \
              $COOKIE_ARG --js-runtimes node \
              "$URL"
          fi

          DOWNLOADED=$(ls -t downloads/youtube/*.mp4 downloads/youtube/*.webm \
            downloads/youtube/*.mkv downloads/youtube/*.mp3 2>/dev/null | head -1 || echo "")

          if [ -n "$DOWNLOADED" ]; then
            echo "file=$DOWNLOADED" >> $GITHUB_OUTPUT
            echo "Downloaded: $DOWNLOADED"
            echo "$(basename "$DOWNLOADED")" > "$CACHE_FILE"
          fi

      - name: Extract metadata
        run: |
          for info_file in downloads/youtube/*.info.json; do
            [ -f "$info_file" ] || continue
            base=$(basename "${info_file%.info.json}")

            thumb=""
            for ext in jpg webp png; do
              [ -f "downloads/youtube/${base}.${ext}" ] && thumb="downloads/youtube/${base}.${ext}" && break
            done
            [ -z "$thumb" ] && thumb=$(ls -t downloads/youtube/*.jpg 2>/dev/null | head -1 || echo "")

            jq --arg t "$thumb" '{
              title:       (.title          // "Unknown"),
              uploader:    (.uploader       // "Unknown"),
              duration:    (.duration_string // "Unknown"),
              upload_date: (.upload_date    // "Unknown"),
              view_count:  (.view_count     // 0),
              description: ((.description  // "") | .[0:200]),
              original_url:(.webpage_url   // ""),
              thumbnail:   (if $t != "" then $t else (.thumbnail // "") end)
            }' "$info_file" > "downloads/youtube/${base}.json"
          done
          rm -f downloads/youtube/*.info.json downloads/youtube/*.webp downloads/youtube/*.png

      - name: Split large files
        run: |
          MAX=$((100 * 1024 * 1024))
          CHUNK=$((90  * 1024 * 1024))
          cd downloads/youtube
          for f in *; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            [ "$size" -le "$MAX" ] && continue

            base="${f%.*}"; ext="${f##*.}"
            split -b "$CHUNK" -d -a 2 "$f" "${base}part"
            n=1
            for part in "${base}part"*; do
              [ -f "$part" ] || continue
              zip -q "${base}part$(printf '%02d' $n).zip" "$part" && rm -f "$part"
              n=$((n+1))
            done
            parts=$(ls -1 "${base}part"*.zip 2>/dev/null | wc -l)
            rm -f "$f"
            [ -f "${base}.json" ] && python3 -c "
import json,sys
d=json.load(open(sys.argv[1]))
d.update({'split':True,'zip':True,'parts':int(sys.argv[2]),'original_size':int(sys.argv[3]),'ext':sys.argv[4]})
json.dump(d,open(sys.argv[1],'w'),indent=2)" "${base}.json" "$parts" "$size" "$ext"
          done
          cd ../..

      - name: Update history.json
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          [ -f "$REPO_ROOT/history.json" ] || echo "[]" > "$REPO_ROOT/history.json"

          cd downloads/youtube
          for mf in *.mp4 *.webm *.mkv *.mp3; do
            [ -f "$mf" ] || continue
            base="${mf%.*}"; ext="${mf##*.}"
            size=$(stat -c%s "$mf" 2>/dev/null || echo 0)
            ts=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

            IS_SPLIT=false; PARTS_JSON="[]"
            if [ -f "${base}part01.zip" ] || [ -f "${base}part1.zip" ]; then
              IS_SPLIT=true
              pc=$(ls -1 ${base}part*.zip 2>/dev/null | wc -l)
              arr=""
              for i in $(seq 1 $pc); do
                pf="${base}part$(printf '%02d' $i).zip"
                [ -f "$pf" ] || continue
                [ -n "$arr" ] && arr="$arr,"
                ps=$(stat -c%s "$pf" 2>/dev/null || echo 0)
                arr="${arr}{\"filename\":\"$pf\",\"size\":$ps}"
              done
              PARTS_JSON="[$arr]"
            fi

            TITLE="$base"; THUMB=""; DUR=""; UPL=""
            if [ -f "${base}.json" ]; then
              TITLE=$(jq -r '.title     // "Unknown"' "${base}.json")
              THUMB=$(jq -r '.thumbnail // ""'        "${base}.json")
              DUR=$(jq   -r '.duration  // ""'        "${base}.json")
              UPL=$(jq   -r '.uploader  // ""'        "${base}.json")
              [ -f "${base}.jpg" ] && THUMB="${base}.jpg"
            fi
            TITLE=$(echo "$TITLE" | jq -Rs '.[:-1] // .')

            EXISTS=$(jq --arg fn "$mf" \
              '[.[] | select(.filename==$fn and .type=="youtube")] | length' \
              "$REPO_ROOT/history.json")
            [ "$EXISTS" -eq 0 ] || continue

            jq --arg id  "$(date +%s)-$RANDOM" \
                --arg fn  "$mf" \
                --arg ti  "$TITLE" \
                --arg ghu "https://github.com/${{ github.repository }}/blob/main/downloads/youtube/$mf" \
                --arg th  "$THUMB" \
                --arg q   "${{ github.event.inputs.quality }}" \
                --arg fmt "$ext" \
                --arg dur "$DUR" \
                --arg upl "$UPL" \
                --arg sz  "$size" \
                --arg cat "$ts" \
                --arg rid "${{ github.run_id }}" \
                --argjson sp "$IS_SPLIT" \
                --argjson pa "$PARTS_JSON" \
                '. += [{id:$id,filename:$fn,title:$ti,githubUrl:$ghu,
                        thumbnail:$th,type:"youtube",quality:$q,format:$fmt,
                        duration:$dur,uploader:$upl,size:$sz,createdAt:$cat,
                        isSplit:$sp,parts:$pa,runId:$rid}]' \
                "$REPO_ROOT/history.json" > "$REPO_ROOT/history.json.tmp" \
             && mv "$REPO_ROOT/history.json.tmp" "$REPO_ROOT/history.json"
            echo "Added: $mf"
          done

          cd "$REPO_ROOT"
          jq '.[-100:]' history.json > history.json.tmp && mv history.json.tmp history.json

      - name: Commit and push
        run: |
          git config user.name  "mown Downloader"
          git config user.email "mown@system.local"
          git add downloads/youtube/ history.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "mown: Download $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: download
          path: downloads/youtube/
          retention-days: 1

      - name: Cleanup old downloads
        if: always()
        run: |
          cd downloads/youtube 2>/dev/null || exit 0
          COUNT=$(find . -maxdepth 1 \
            \( -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" -o -name "*.mp3" \) \
            -type f | wc -l)
          [ "$COUNT" -le 50 ] && exit 0

          find . -maxdepth 1 \
            \( -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" -o -name "*.mp3" \) \
            -type f -printf '%T@ %p\n' | sort -rn | tail -n +51 | cut -d' ' -f2- | \
          while read f; do
            rm -f "$f" "${f%.*}.json" "${f%.*}.jpg"
          done

          cd ../..
          git add -A && git commit -m "mown: Auto cleanup" || true
          git push || true