name: Desktop Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.3)"
        required: false

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            platform: mac
            arch: arm64
          - name: macOS (Intel)
            os: macos-13
            platform: mac
            arch: x64
          - name: Windows
            os: windows-latest
            platform: win
            arch: x64
          - name: Linux
            os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xauth xvfb libgbm-dev libasound2-dev \
            libatk-bridge2.0-0 libdrm2 libxkbcommon0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron binary
        shell: bash
        run: |
          INSTALL_SCRIPT=$(find node_modules/.pnpm -name "install.js" -path "*/electron/install.js" 2>/dev/null | head -1)
          if [ -n "$INSTALL_SCRIPT" ]; then node "$INSTALL_SCRIPT"; fi
        continue-on-error: true

      - name: Build Next.js
        run: pnpm build

      - name: Copy static assets for standalone
        shell: bash
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d "public" ]; then
            cp -r public .next/standalone/public
          fi

      - name: Compile Electron TypeScript
        run: pnpm exec tsc -p electron/tsconfig.json

      - name: Build Electron — ${{ matrix.platform }} ${{ matrix.arch }}
        run: pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mown ${{ github.ref_name }}"
          body: |
            ## Mown ${{ github.ref_name }}

            ### دانلود / Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `.dmg` (arm64) |
            | macOS | Intel | `.dmg` (x64) |
            | Windows | x64 | `.exe` (installer) |
            | Linux | x64 | `.AppImage` or `.deb` |

            ### نصب / Installation
            - **macOS**: فایل `.dmg` را باز کرده و Mown را به Applications بکشید
            - **Windows**: فایل `.exe` را اجرا کنید
            - **Linux AppImage**: `chmod +x Mown-*.AppImage && ./Mown-*.AppImage`
            - **Linux deb**: `sudo dpkg -i mown_*.deb`
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
